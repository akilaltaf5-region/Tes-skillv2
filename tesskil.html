<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Tutup</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --red: #e03c31;
      --orange: #f5a623;
      --cream: #f0ead6;
      --muted: #555;
      --dim: #222;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    /* animated scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stamp {
      display: inline-block;
      border: 3px solid var(--red);
      color: var(--red);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 10vw, 5rem);
      letter-spacing: 0.15em;
      padding: 0.2em 0.5em;
      transform: rotate(-4deg);
      text-transform: uppercase;
      position: relative;
      margin-bottom: 2.5rem;
      animation: flicker 3s infinite;
      box-shadow: inset 0 0 0 3px var(--red), 0 0 30px rgba(224,60,49,0.3);
    }
    .stamp::after {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px dashed rgba(224,60,49,0.4);
    }

    @keyframes flicker {
      0%,100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.6; }
      94% { opacity: 1; }
      96% { opacity: 0.7; }
      97% { opacity: 1; }
    }

    .subtitle {
      font-size: clamp(0.75rem, 2.5vw, 0.95rem);
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      animation: fadeIn 1.4s 0.3s ease both;
    }

    .reason {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: var(--cream);
      margin-bottom: 3rem;
      line-height: 1.6;
      animation: fadeIn 1.4s 0.5s ease both;
    }
    .reason span {
      color: var(--orange);
      font-style: italic;
    }

    /* Countdown */
    .countdown-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      animation: fadeIn 1.4s 0.7s ease both;
    }

    .countdown {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 3rem;
      animation: fadeIn 1.4s 0.9s ease both;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }

    .unit-val {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: var(--cream);
      background: var(--dim);
      padding: 0.2em 0.4em;
      border: 1px solid #333;
      min-width: 2.5em;
      display: block;
      text-align: center;
      position: relative;
      transition: color 0.3s;
    }
    .unit-val::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(0,0,0,0.5);
    }

    .unit-name {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* progress bar */
    .bar-wrap {
      width: 100%;
      max-width: 400px;
      margin: 0 auto 2rem;
      animation: fadeIn 1.4s 1.1s ease both;
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .bar-bg {
      height: 6px;
      background: var(--dim);
      border-radius: 0;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--orange));
      width: 100%;
      transform-origin: right;
      transition: transform 1s linear;
    }

    .footer-note {
      font-size: 0.7rem;
      color: #333;
      letter-spacing: 0.1em;
      animation: fadeIn 1.4s 1.3s ease both;
    }

    /* blinking cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--orange);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div class="container">
    <div class="stamp">TUTUP</div>

    <p class="subtitle">— Status Website —</p>

    <p class="reason">
      Website ini telah <span>resmi ditutup</span><br/>
      dikarenakan admin sudah <span>terlalu capek</span> 😮‍💨
    </p>

    <p class="countdown-label">⏳ Waktu sejak website masih aktif</p>

    <div class="countdown">
      <div class="unit">
        <span class="unit-val" id="y">10</span>
        <span class="unit-name">Tahun</span>
      </div>
      <div class="unit">
        <span class="unit-val" id="d">000</span>
        <span class="unit-name">Hari</span>
      </div>
      <div class="unit">
        <span class="unit-val" id="h">00</span>
        <span class="unit-name">Jam</span>
      </div>
      <div class="unit">
        <span class="unit-val" id="m">00</span>
        <span class="unit-name">Menit</span>
      </div>
      <div class="unit">
        <span class="unit-val" id="s">00</span>
        <span class="unit-name">Detik</span>
      </div>
    </div>

    <div class="bar-wrap">
      <div class="bar-label">
        <span>Semangat admin</span>
        <span id="pct">0%</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" id="bar"></div>
      </div>
    </div>

    <p class="footer-note">© Admin yang sudah menyerah<span class="cursor"></span></p>
  </div>

  <script>
    // Start from 10 years in seconds and count DOWN
    const TEN_YEARS = 10 * 365.25 * 24 * 3600;
    let remaining = TEN_YEARS;

    function pad(n, len = 2) {
      return String(Math.floor(n)).padStart(len, '0');
    }

    function update() {
      if (remaining <= 0) {
        remaining = 0;
      }

      const totalSeconds = remaining;
      const years  = Math.floor(totalSeconds / (365.25 * 24 * 3600));
      const afterY = totalSeconds % (365.25 * 24 * 3600);
      const days   = Math.floor(afterY / (24 * 3600));
      const afterD = afterY % (24 * 3600);
      const hours  = Math.floor(afterD / 3600);
      const afterH = afterD % 3600;
      const mins   = Math.floor(afterH / 60);
      const secs   = Math.floor(afterH % 60);

      document.getElementById('y').textContent = pad(years);
      document.getElementById('d').textContent = pad(days, 3);
      document.getElementById('h').textContent = pad(hours);
      document.getElementById('m').textContent = pad(mins);
      document.getElementById('s').textContent = pad(secs);

      // bar shows how much time is GONE (energy drained)
      const gone = TEN_YEARS - remaining;
      const pct  = Math.min(100, (gone / TEN_YEARS) * 100);
      // bar fills from right = shrinks from left (energy draining)
      document.getElementById('bar').style.transform = `scaleX(${1 - pct/100})`;
      document.getElementById('pct').textContent = Math.floor(pct) + '%';

      remaining -= 1;
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
