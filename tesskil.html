<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Offline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #ffffff;
        }

        p {
            font-weight: 300;
            line-height: 1.6;
            color: #888;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: #ff5555;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">MAINTENANCE MODE</div>
        <h1>Website Tutup</h1>
        <p>Alasan admin lagi cape: lagi proses <strong>remove</strong> dan <strong>ganti semua</strong> isi biar lebih fresh.</p>
        <p>See you next time!</p>
        
        <div class="footer">
            — Akil
        </div>
    </div>

</body>
</html>
